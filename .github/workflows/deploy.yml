# Push to main → auto-deploy to production server.
# Requires repo secrets: SERVER_SSH_PRIVATE_KEY, SERVER_HOST, SERVER_USER
name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          DIR="${APP_DIR:-/home/ec2-user/enably-vgen}"
          ssh -o BatchMode=yes "${SERVER_USER}@${SERVER_HOST}" \
            "cd ${DIR} && APP_DIR=${DIR} bash scripts/deploy.sh"
