# systemd-journald: cap journal size and drop entries older than one week.
# Uvicorn logs from the app unit are stored in the journal by default.
#
# Install (once per server, from repo root):
#   sudo ./scripts/setup_log_retention.sh
#
# Or manually:
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp deploy/journald-retention.conf /etc/systemd/journald.conf.d/99-avatar-retention.conf
#   sudo systemctl restart systemd-journald
#
[Journal]
SystemMaxUse=512M
MaxRetentionSec=7day
