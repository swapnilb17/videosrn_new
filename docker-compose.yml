services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-avatar_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-avatar}
    volumes:
      - /opt/enably/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-avatar_app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-avatar_app}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-avatar_app}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-avatar}
      ARTIFACT_ROOT: /data/jobs
      FFMPEG_PATH: /usr/bin/ffmpeg
      GOOGLE_TTS_CREDENTIALS_JSON: /secrets/gcp/service-account.json
    volumes:
      - /mnt/scratch/jobs:/data/jobs
      - /opt/enably/gcp-credentials:/secrets/gcp:ro
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    # Pass secrets from the project .env (Compose interpolates ${VAR} from that file).
    # Avoids env_file: which hard-fails if .env is missing or unreadable on the host.
    environment:
      INTERNAL_BACKEND_URL: http://backend:8000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

