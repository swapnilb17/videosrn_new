# No static "upstream" blocks: Docker recreates containers with new IPs. Nginx caches
# resolved hostnames unless we use resolver + variable proxy_pass (see HTTPS server).

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ai.enablyai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ai.enablyai.com;

    ssl_certificate     /etc/letsencrypt/live/ai.enablyai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.enablyai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Docker embedded DNS — re-resolve backend/frontend after `compose up` / recreate
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Backend API routes
    location /generate {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /media/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    # Next.js route handlers (^~ = prefer over /api/ to FastAPI)
    # Next.js route handlers — default proxy_read_timeout (60s) is too short when the SSR
    # route waits on Postgres-backed /internal/* (Media Library, credits).
    # Credits / redeem — Next proxies to backend with X-User-* headers
    location ^~ /api/credits/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Media library — NextAuth session + X-User-Email to backend /internal/user-media
    location ^~ /api/user-media {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Media downloads — Next.js route streams /media/* from FastAPI (must not hit /api/ → backend)
    location ^~ /api/download-proxy/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NextAuth API routes (Google sign-in session)
    location ^~ /api/auth/ {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_read_timeout 600s;
        proxy_send_timeout 300s;
    }

    location /auth/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    location /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    location /docs {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    location /redoc {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    location /openapi.json {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    # Next.js frontend
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
