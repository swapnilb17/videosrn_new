upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name ai.enablyai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ai.enablyai.com;

    ssl_certificate     /etc/letsencrypt/live/ai.enablyai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.enablyai.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Backend API routes
    location /generate {
        proxy_pass         http://backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /media/ {
        proxy_pass http://backend;
    }

    # Next.js route handlers (must be before catch-all /api/)
    # Credits / redeem — Next proxies to backend with X-User-* headers
    location /api/credits/ {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Media library — NextAuth session + X-User-Email to backend /internal/user-media
    location /api/user-media {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # NextAuth API routes (Google sign-in session)
    location /api/auth/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass         http://backend;
        proxy_read_timeout 600s;
        proxy_send_timeout 300s;
    }

    location /auth/ {
        proxy_pass http://backend;
    }

    location /health {
        proxy_pass http://backend;
    }

    location /docs {
        proxy_pass http://backend;
    }

    location /redoc {
        proxy_pass http://backend;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # Next.js frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
